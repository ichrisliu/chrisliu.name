name: Deploy Hugo to MyServer

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # 自动拉取 Git 子模块（如果有的话）

      # 🔥 解决纯 IPv6 无法连接的关键：在 GitHub 宿主机上套一层 Cloudflare WARP 隧道
      - name: Set up Cloudflare WARP (Enable IPv6)
        uses: fscarmen/warp-on-actions@v1.1
        with:
          stack: dual # 开启双栈，让 GitHub Actions 获得访问 IPv6 的能力

      # 安装 Hugo 环境
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      # 执行 Hugo 编译，生成 public 静态文件夹
      - name: Build Hugo Site
        run: |
          hugo -d public

      # 将编译好的静态文件传输到 IPv6 的服务器
      - name: Deploy via Native SCP
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_USER: ${{ secrets.SERVER_USERNAME }}
          SERVER_HOST: "2406:da18:e66:d766:7483:b8c1:f8ea:c279"
          TARGET_DIR: ${{ secrets.WEB_ROOT }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          ssh-keyscan -6 -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          
          tar -czf public.tar.gz -C public .
          scp -6 -i ~/.ssh/id_ed25519 -r public/* ${SERVER_USER}@[${SERVER_HOST}]:/tmp/
          ssh -6 -i ~/.ssh/id_ed25519 ${SERVER_USER}@${SERVER_HOST} "mkdir -p ${TARGET_DIR} && tar -xzf /tmp/public.tar.gz -C ${TARGET_DIR} && rm /tmp/public.tar.gz"

